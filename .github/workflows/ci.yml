name: ci

# DEC-6: runs on every push and PR. Static checks + tests only — no apply,
# no AWS credentials required (terraform validate/fmt/tflint/checkov are static;
# pytest is hermetic and the plan-parsing test skip-guards when terraform/creds
# are absent).
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"
      - name: fmt
        run: terraform fmt -check -recursive
      - name: init (no backend)
        run: terraform -chdir=environments/dev init -backend=false
      - name: validate
        run: terraform -chdir=environments/dev validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.63.1
      - name: tflint
        run: |
          tflint --init
          tflint --recursive

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install -r requirements-dev.txt ruff pip-audit checkov
      - name: ruff (DEC-9)
        run: ruff check src tests
      - name: pip-audit (DEC-8)
        run: |
          for req in src/*/requirements.txt; do
            echo "== $req =="; pip-audit -r "$req" --strict
          done
      - name: pytest
        run: pytest
      - name: checkov (DEC-9)
        run: checkov --config-file .checkov.yaml

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: install
        working-directory: console
        run: npm ci --no-fund --no-audit
      - name: npm audit (DEC-8, JS supply chain)
        working-directory: console
        # Report High/Critical advisories in the RUNTIME dependency tree (--omit=dev:
        # the shipped SPA ships no dev deps; dev-toolchain advisories are handled by
        # Dependabot). continue-on-error so a newly-published transitive CVE surfaces
        # in the logs without red-lining every unrelated PR until a bump lands; the
        # Dependabot security updates are the enforced remediation path.
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
      - name: vitest
        working-directory: console
        run: npm test
      - name: build
        working-directory: console
        run: npm run build
