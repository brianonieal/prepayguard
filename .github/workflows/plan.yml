name: plan

# DEC-6: terraform plan on PRs to main, posted as a PR comment. NO auto-apply -
# apply stays a manual, deliberate action.
#
# REQUIRES a GitHub secret AWS_PLAN_ROLE_ARN: an IAM role (OIDC-trusted for this
# repo) with read/plan permissions. Until it is set, every credentialed step
# (creds, init, plan, comment, fail-check) is skipped and the job finishes GREEN
# with a single "plan skipped" note; ci.yml is the gate. Local backend means CI
# state is per-run, so the plan (when enabled) shows a full create diff
# (documented tradeoff for course scope; a remote backend would reflect real drift).
#
# NOTE: the `secrets` context is NOT allowed in `if:` conditions (that was the prior
# red "workflow file issue"). The presence of the role secret is promoted to a
# job-level env var (env CAN read secrets) and every guard tests that env var.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write # for AWS OIDC

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      HAS_ROLE: ${{ secrets.AWS_PLAN_ROLE_ARN != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        if: ${{ env.HAS_ROLE == 'true' }}
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"
      - name: init
        if: ${{ env.HAS_ROLE == 'true' }}
        run: terraform -chdir=environments/dev init
      - name: plan skipped (missing AWS_PLAN_ROLE_ARN)
        if: ${{ env.HAS_ROLE != 'true' }}
        run: 'echo "Terraform plan skipped: repository secret AWS_PLAN_ROLE_ARN is not set." > plan.txt'
      - name: plan
        id: plan
        if: ${{ env.HAS_ROLE == 'true' }}
        run: terraform -chdir=environments/dev plan -no-color -input=false 2>&1 | tee plan.txt
        continue-on-error: true
      - uses: actions/github-script@v9
        if: ${{ env.HAS_ROLE == 'true' }}
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('plan.txt', 'utf8');
            if (plan.length > 60000) plan = plan.slice(0, 60000) + '\n... (truncated)';
            const body = `#### Terraform Plan \`${{ steps.plan.outcome }}\`\n<details><summary>Show plan</summary>\n\n\`\`\`terraform\n${plan}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
      - name: fail if plan errored
        if: ${{ env.HAS_ROLE == 'true' && steps.plan.outcome == 'failure' }}
        run: exit 1
