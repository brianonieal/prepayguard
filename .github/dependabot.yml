# DEC-8 (supply chain): keep dependencies current and surface advisories that the
# CI npm audit reports but does not block on. Minor/patch bumps are grouped into one
# weekly PR to reduce noise; MAJOR bumps are deliberately left ungrouped so a breaking
# major (e.g. vite 6->7) arrives as its own reviewable/bisectable PR, not bundled with
# unrelated updates.
version: 2
updates:
  # Console SPA (React / Vite / Amplify): runtime and dev toolchain.
  - package-ecosystem: npm
    directory: /console
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      console-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Python handlers (one requirements.txt per component) plus the dev requirements.
  - package-ecosystem: pip
    directories:
      - /
      - /src/*
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # The GitHub Actions used by ci.yml and plan.yml.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
